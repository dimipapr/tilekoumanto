# docs/contracts/openapi.yaml

contract: api
version: 1

endpoints:
  latest_device_state:
    method: GET
    path: /api/devices/{device_uuid}/state
    description: Return the latest known state for one field device.

    parameters:
      device_uuid: Stable UUID identifying the field device.

    response:
      device_uuid: string
      mains_power_present: boolean
      pump_relay_active: boolean
      device_reported_at: string
      backend_received_at: string
    
    errors:
      404:
        device_not_found: No device exists for the requested UUID
        device_state_not_found: The device exists but has no pump state samples.