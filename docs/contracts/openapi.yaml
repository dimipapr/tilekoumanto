contract: api
version: 1

endpoints:
  latest_device_state:
    method: GET
    path: /api/devices/{device_uuid}/state
    description: Return the latest known state for one field device.

    parameters:
      device_uuid: Stable UUID identifying the field device.

    response:
      device_uuid: string
      mains_power_present: boolean
      pump_relay_active: boolean
      device_reported_unix_time_ms: integer
      backend_received_at: string
      state_is_stale: boolean